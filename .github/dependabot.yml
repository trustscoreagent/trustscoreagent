version: 2

updates:
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    commit-message:
      prefix: "deps"
    ignore:
      # FluentAssertions 8.x switched to a paid commercial license; stay on the free 7.x line.
      - dependency-name: "FluentAssertions"
        versions: [">=8.0.0"]
      # Microsoft.OpenApi 3.x is a different major; Swashbuckle 10.x targets the 2.x line.
      - dependency-name: "Microsoft.OpenApi"
        versions: [">=3.0.0"]

  - package-ecosystem: "docker"
    directory: "/src/TrustScore.Api"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
    commit-message:
      prefix: "deps"
    ignore:
      # The app targets .NET 8; do not bump the SDK/runtime base images to a new major.
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
    commit-message:
      prefix: "deps"
