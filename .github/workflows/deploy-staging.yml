name: Deploy Staging

# Only deploy after CI has succeeded on main, and deploy exactly the commit CI validated.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: europe-west1
  SERVICE_NAME: trustscoreagent-api-staging
  IMAGE_NAME: europe-west1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/trustscoreagent/api

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging
    # Skip unless the CI run we are reacting to actually passed.
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker europe-west1-docker.pkg.dev --quiet

      - name: Build and push Docker image
        env:
          DEPLOY_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          IMAGE="${IMAGE_NAME}:${DEPLOY_SHA}"
          docker build -f src/TrustScore.Api/Dockerfile -t "$IMAGE" .
          docker push "$IMAGE"

      - name: Deploy to Cloud Run
        env:
          DEPLOY_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          gcloud run deploy $SERVICE_NAME \
            --image "${IMAGE_NAME}:${DEPLOY_SHA}" \
            --region $GCP_REGION \
            --platform managed \
            --allow-unauthenticated \
            --min-instances 0 \
            --max-instances 5 \
            --concurrency 200 \
            --cpu 1 \
            --memory 512Mi \
            --set-env-vars "ASPNETCORE_ENVIRONMENT=Staging" \
            --set-secrets "ConnectionStrings__PostgreSQL=db-connection-string:latest,ConnectionStrings__Redis=redis-connection-string:latest" \
            --add-cloudsql-instances "${{ secrets.GCP_PROJECT_ID }}:europe-west1:trustscoreagent-db" \
            --vpc-connector "trustscoreagent-connector" \
            --quiet

      - name: Get staging URL
        run: |
          URL=$(gcloud run services describe $SERVICE_NAME --region $GCP_REGION --format 'value(status.url)')
          echo "Staging URL: $URL"
          echo "STAGING_URL=$URL" >> $GITHUB_ENV

      - name: Smoke test
        run: |
          sleep 10
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$STAGING_URL/health")
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Smoke test failed: HTTP $HTTP_CODE"
            exit 1
          fi
          echo "Smoke test passed: HTTP $HTTP_CODE"
          curl -s "$STAGING_URL/health"
