name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to deploy (commit SHA or tag)'
        required: true
        default: 'main'

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: europe-west1
  SERVICE_NAME: trustscoreagent-api
  IMAGE_NAME: europe-west1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/trustscoreagent/api
  DOTNET_VERSION: '8.0.x'

permissions:
  contents: read

jobs:
  # Gate: a production deploy can target an arbitrary ref, so re-run the full test suite against
  # that exact ref before building/deploying. The deploy job will not start unless this passes.
  test:
    name: Test ref before deploy
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: trustscore_test
          POSTGRES_USER: trustscore
          POSTGRES_PASSWORD: trustscore
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref }}

      - name: Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore

      - name: Run tests
        run: dotnet test --no-restore --configuration Release --verbosity normal
        env:
          ConnectionStrings__PostgreSQL: "Server=localhost;Port=5432;Database=trustscore_test;User Id=trustscore;Password=trustscore;"
          ConnectionStrings__Redis: "localhost:6379"

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: test
    environment: production  # Requires manual approval (Required reviewers) once the repo is public

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref }}

      # Tag the image with the SHA of the deployed ref (not github.sha, which is the HEAD of the
      # branch the workflow was dispatched from) so the image tag matches the code it contains.
      - name: Resolve deployed commit SHA
        run: echo "DEPLOY_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker europe-west1-docker.pkg.dev --quiet

      - name: Build and push Docker image
        run: |
          IMAGE="${IMAGE_NAME}:${DEPLOY_SHA}"
          docker build -f src/TrustScore.Api/Dockerfile -t "$IMAGE" .
          docker push "$IMAGE"

      # Capture the revision currently serving 100% of traffic BEFORE deploying the canary, so a
      # failed canary can be rolled back to it. Without this, "rollback" has no stable target to
      # point at and --to-latest would (wrongly) promote the just-deployed canary.
      - name: Capture current stable revision
        run: |
          # On the very first deploy the service does not exist yet, so `describe` errors; tolerate
          # that (STABLE stays empty) instead of failing the whole job under `bash -e`.
          STABLE=$(gcloud run services describe $SERVICE_NAME \
            --region $GCP_REGION \
            --format 'value(status.traffic[0].revisionName)' 2>/dev/null || true)
          echo "STABLE_REVISION=$STABLE" >> "$GITHUB_ENV"
          echo "Current stable revision: ${STABLE:-<none, first deploy>}"

      # Cloud Run refuses `--no-traffic` when creating a NEW service (the first revision must
      # receive traffic), so the canary pattern only applies once the service exists. First deploy
      # goes straight to 100%; subsequent deploys deploy a 0%-traffic canary and shift 5% to it.
      - name: Deploy revision
        run: |
          COMMON=(
            --image "${IMAGE_NAME}:${DEPLOY_SHA}"
            --region "$GCP_REGION"
            --platform managed
            --allow-unauthenticated
            --min-instances 1 --max-instances 100 --concurrency 200 --cpu 2 --memory 1Gi
            --set-env-vars "ASPNETCORE_ENVIRONMENT=Production"
            --set-secrets "ConnectionStrings__PostgreSQL=db-connection-string:latest,ConnectionStrings__Redis=redis-connection-string:latest,AdminApiKey=admin-api-key:latest"
            --add-cloudsql-instances "${{ secrets.GCP_PROJECT_ID }}:europe-west1:trustscoreagent-db"
            --vpc-connector "trustscoreagent-connector"
            --quiet
          )
          if [ -z "$STABLE_REVISION" ]; then
            echo "First deploy: creating the service with 100% traffic."
            gcloud run deploy "$SERVICE_NAME" "${COMMON[@]}"
            echo "CANARY_MODE=false" >> "$GITHUB_ENV"
          else
            echo "Existing service: deploying a 5% canary."
            gcloud run deploy "$SERVICE_NAME" "${COMMON[@]}" --tag canary --no-traffic
            gcloud run services update-traffic "$SERVICE_NAME" --region "$GCP_REGION" --to-tags canary=5
            echo "CANARY_MODE=true" >> "$GITHUB_ENV"
          fi

      - name: Verify (5 min)
        run: |
          # Probe the canary's own tagged URL (it only gets 5% of main traffic, so the main URL
          # would mostly hit the old revision). On a first deploy there is no canary tag — the new
          # revision already serves 100%, so probe the main URL.
          if [ "$CANARY_MODE" = "true" ]; then
            URL=$(gcloud run services describe "$SERVICE_NAME" --region "$GCP_REGION" \
              --flatten 'status.traffic[]' --filter 'status.traffic.tag=canary' \
              --format 'value(status.traffic.url)')
          else
            URL=$(gcloud run services describe "$SERVICE_NAME" --region "$GCP_REGION" \
              --format 'value(status.url)')
          fi
          if [ -z "$URL" ]; then echo "Could not resolve service URL, aborting."; exit 1; fi
          echo "Verifying at $URL"
          for i in $(seq 1 10); do
            sleep 30
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$URL/health")
            echo "Check $i/10: HTTP $HTTP_CODE"
            if [ "$HTTP_CODE" != "200" ]; then
              echo "Health check failed (HTTP $HTTP_CODE)."
              if [ "$CANARY_MODE" = "true" ] && [ -n "$STABLE_REVISION" ]; then
                echo "Rolling 100% back to $STABLE_REVISION (drops the canary to 0%)."
                gcloud run services update-traffic "$SERVICE_NAME" --region "$GCP_REGION" \
                  --to-revisions "$STABLE_REVISION=100"
              fi
              exit 1
            fi
          done
          echo "Health checks passed."

      - name: Promote canary to 100% traffic
        if: env.CANARY_MODE == 'true'
        run: |
          gcloud run services update-traffic "$SERVICE_NAME" \
            --region "$GCP_REGION" \
            --to-latest
          echo "Production deployment complete."

      - name: Get production URL
        run: |
          URL=$(gcloud run services describe $SERVICE_NAME --region $GCP_REGION --format 'value(status.url)')
          echo "Production URL: $URL"
