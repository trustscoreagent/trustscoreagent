name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to deploy (commit SHA or tag)'
        required: true
        default: 'main'

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: europe-west1
  SERVICE_NAME: trustscoreagent-api
  IMAGE_NAME: europe-west1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/trustscoreagent/api
  DOTNET_VERSION: '8.0.x'

permissions:
  contents: read

jobs:
  # Gate: a production deploy can target an arbitrary ref, so re-run the full test suite against
  # that exact ref before building/deploying. The deploy job will not start unless this passes.
  test:
    name: Test ref before deploy
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: trustscore_test
          POSTGRES_USER: trustscore
          POSTGRES_PASSWORD: trustscore
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ inputs.ref }}

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore

      - name: Run tests
        run: dotnet test --no-restore --configuration Release --verbosity normal
        env:
          ConnectionStrings__PostgreSQL: "Server=localhost;Port=5432;Database=trustscore_test;User Id=trustscore;Password=trustscore;"
          ConnectionStrings__Redis: "localhost:6379"

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: test
    environment: production  # Requires manual approval (Required reviewers) once the repo is public

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ inputs.ref }}

      # Tag the image with the SHA of the deployed ref (not github.sha, which is the HEAD of the
      # branch the workflow was dispatched from) so the image tag matches the code it contains.
      - name: Resolve deployed commit SHA
        run: echo "DEPLOY_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker europe-west1-docker.pkg.dev --quiet

      - name: Build and push Docker image
        run: |
          IMAGE="${IMAGE_NAME}:${DEPLOY_SHA}"
          docker build -f src/TrustScore.Api/Dockerfile -t "$IMAGE" .
          docker push "$IMAGE"

      - name: Deploy canary (0% traffic)
        run: |
          gcloud run deploy $SERVICE_NAME \
            --image "${IMAGE_NAME}:${DEPLOY_SHA}" \
            --region $GCP_REGION \
            --platform managed \
            --allow-unauthenticated \
            --min-instances 1 \
            --max-instances 100 \
            --concurrency 200 \
            --cpu 2 \
            --memory 1Gi \
            --set-env-vars "ASPNETCORE_ENVIRONMENT=Production" \
            --set-secrets "ConnectionStrings__PostgreSQL=db-connection-string:latest,ConnectionStrings__Redis=redis-connection-string:latest" \
            --add-cloudsql-instances "${{ secrets.GCP_PROJECT_ID }}:europe-west1:trustscoreagent-db" \
            --vpc-connector "trustscoreagent-connector" \
            --tag canary \
            --no-traffic \
            --quiet

      - name: Route 5% traffic to canary
        run: |
          gcloud run services update-traffic $SERVICE_NAME \
            --region $GCP_REGION \
            --to-tags canary=5

      - name: Verify canary (5 min)
        run: |
          URL=$(gcloud run services describe $SERVICE_NAME --region $GCP_REGION --format 'value(status.url)')
          echo "Waiting 5 minutes to verify canary..."
          for i in $(seq 1 10); do
            sleep 30
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$URL/health")
            echo "Check $i/10: HTTP $HTTP_CODE"
            if [ "$HTTP_CODE" != "200" ]; then
              echo "Canary check failed (HTTP $HTTP_CODE), rolling back..."
              gcloud run services update-traffic $SERVICE_NAME \
                --region $GCP_REGION \
                --to-latest
              exit 1
            fi
          done
          echo "Canary passed all checks."

      - name: Promote to 100% traffic
        run: |
          gcloud run services update-traffic $SERVICE_NAME \
            --region $GCP_REGION \
            --to-latest
          echo "Production deployment complete."

      - name: Get production URL
        run: |
          URL=$(gcloud run services describe $SERVICE_NAME --region $GCP_REGION --format 'value(status.url)')
          echo "Production URL: $URL"
