name: Deploy landing (Cloudflare Pages)

# Deploys the static landing + DID documents in site/ to the Cloudflare Pages
# project "trustscoreagent". Replaces the Cloudflare Git integration (which kept
# opening auto-config PRs, ran failing branch builds, and once broke the landing
# with a wrong build output dir). This is a controlled direct-upload deploy.
#
# Requires one repo secret: CLOUDFLARE_API_TOKEN — a token with the
# "Account · Cloudflare Pages · Edit" permission for this account.

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/deploy-landing.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy site/ to Cloudflare Pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Deploy to Cloudflare Pages (production)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: fe671dd9163944b0de47746b0790d480
        run: |
          npx --yes wrangler@4 pages deploy site \
            --project-name=trustscoreagent \
            --branch=main
