name: Publish to MCP Registry

# Publishes mcp-server/server.json to the official MCP Registry
# (registry.modelcontextprotocol.io) using GitHub OIDC — no secrets, no
# interactive login. Ownership of the io.github.trustscoreagent/* namespace is
# proven by the workflow running under this org's repository identity.
#
# Prerequisite: the npm package @trustscoreagent/mcp-server must already be
# published at the version in server.json, and its published package.json must
# carry the matching "mcpName" field. npm publishing is manual (the account
# requires interactive 2FA), so run this AFTER `npm publish`.
#
# Trigger it either by pushing a tag (v0.1.1) or manually from the Actions tab
# / `gh workflow run "Publish to MCP Registry"`.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Authenticate to MCP Registry (GitHub OIDC)
        working-directory: mcp-server
        run: ../mcp-publisher login github-oidc

      - name: Publish server to MCP Registry
        working-directory: mcp-server
        run: ../mcp-publisher publish
