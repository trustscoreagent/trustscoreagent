services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: trustscore
      POSTGRES_USER: trustscore
      POSTGRES_PASSWORD: trustscore
    # Bind to loopback only: on a shared LAN, 0.0.0.0 would expose the dev DB to the network.
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trustscore"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    # Loopback only: Redis has no auth here, so it must never be reachable from the LAN.
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
